build:
  generated-by: csolution version 2.14.1+p9-g859cb6c9
  solution: ../../../chujue.csolution.yml
  project: ../../../chujue.cproject.yml
  context: chujue+chujue
  compiler: AC6
  optimize: debug
  debug: on
  misc:
    ASM:
      - -masm=auto
    C:
      - -std=c99
      - -fno-rtti
      - -funsigned-char
      - -fshort-enums
      - -fshort-wchar
      - -ffunction-sections
      - -Wno-packed
      - -Wno-missing-variable-declarations
      - -Wno-missing-prototypes
      - -Wno-missing-noreturn
      - -Wno-sign-conversion
      - -Wno-nonportable-include-path
      - -Wno-reserved-id-macro
      - -Wno-unused-macros
      - -Wno-documentation-unknown-command
      - -Wno-documentation
      - -Wno-license-management
      - -Wno-parentheses-equality
    CPP:
      - -xc++
      - -std=c++11
      - -fno-exceptions
      - -fno-rtti
      - -funsigned-char
      - -fshort-enums
      - -fshort-wchar
      - -ffunction-sections
      - -Wno-packed
      - -Wno-missing-variable-declarations
      - -Wno-missing-prototypes
      - -Wno-missing-noreturn
      - -Wno-sign-conversion
      - -Wno-nonportable-include-path
      - -Wno-reserved-id-macro
      - -Wno-unused-macros
      - -Wno-documentation-unknown-command
      - -Wno-documentation
      - -Wno-license-management
      - -Wno-parentheses-equality
    Link:
      - --map
      - --load_addr_map_info
      - --xref
      - --callgraph
      - --symbols
      - --info sizes
      - --info totals
      - --info unused
      - --info veneers
      - --strict
      - --summary_stderr
      - --info summarysizes
  define:
    - USE_HAL_DRIVER
    - STM32F103xB
  add-path:
    - ../../../../Core/Inc
    - ../../../../Drivers/STM32F1xx_HAL_Driver/Inc
    - ../../../../Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
    - ../../../../Drivers/CMSIS/Device/ST/STM32F1xx/Include
    - ../../../../Drivers/CMSIS/Include
  output-dirs:
    intdir: ../../../tmp
    outdir: .
    rtedir: ../../../RTE
  output:
    - type: elf
      file: chujue.axf
    - type: comp-db
      file: compile_commands.json
    - type: comp-db
      file: compile_macros.h
